name: Build & Release

# 传输策略（永久生效）
# GitHub（国际）→ 自带 .exe 附件（国际下载点）
# CNB（国内）→ Pipeline 自动构建 + 自带 .exe 附件（国内快）
# Gitee / GitCode → 发布时只放 CNB 下载链接，不上传附件
# 发版流程详见 skill: release-one-modbus
#
# ┌─ CNB Pipeline（国内）───┐
# │  master.push 触发        │
# │  CGO 交叉编译 .exe       │ ← 国内下载点
# │  自动创建 CNB Release    │
# └──────────────────────────┘
#
# ┌─ GitHub Actions ────────┐
# │  tag push 触发           │
# │  CGO 交叉编译 .exe       │ ← 国际下载点
# │  自动创建 GitHub Release │
# └──────────────────────────┘

on:
  push:
    branches: [master]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to base release on (e.g. v0.3.8)'
        required: true

jobs:
  build:
    name: Build Windows EXE
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Install mingw-w64 (CGO cross-compiler for go-sqlite3)
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-mingw-w64-x86-64 mingw-w64-tools

      - name: Init go.mod (skip if already exists)
        run: |
          if [ ! -f go.mod ]; then
            go mod init modbusrtu_broker
          fi
          go mod tidy

      - name: Build version resources (.syso + icon)
        run: |
          echo "Generate versioninfo from git tag..."
          VER="${GITHUB_REF#refs/tags/v}"  # v0.3.0 → 0.3.0
          VER_DOT="${VER}.0"                # 0.3.0 → 0.3.0.0 (Windows 4-part)
          IFS='.' read -ra PARTS <<< "$VER"
          cat > versioninfo.json << EOF
          {
          "FixedFileInfo": {
            "FileVersion": { "Major": ${PARTS[0]}, "Minor": ${PARTS[1]}, "Patch": ${PARTS[2]}, "Build": 0 },
            "ProductVersion": { "Major": ${PARTS[0]}, "Minor": ${PARTS[1]}, "Patch": ${PARTS[2]}, "Build": 0 },
            "FileFlagsMask": "3f", "FileFlags": "00", "FileOS": "040004", "FileType": "01", "FileSubType": "00"
          },
          "StringFileInfo": {
            "Comments": "下载新版: cnb.cool/pdlei.cn/one-modbus/releases | github.com/dingjiazhi/one-modbus/releases",
            "CompanyName": "丁家智",
            "FileDescription": "modbusrtu_broker - Modbus RTU 数据采集网关 | 更新: cnb.cool/pdlei.cn/one-modbus/releases | github.com/dingjiazhi/one-modbus/releases",
            "FileVersion": "${VER_DOT}",
            "InternalName": "modbusrtu_broker",
            "LegalCopyright": "Copyright (C) 2026 丁家智",
            "OriginalFilename": "modbusrtu_broker.exe",
            "ProductName": "one-modbus",
            "ProductVersion": "${VER_DOT}"
          },
          "IconPath": "app.ico",
          "ManifestPath": ""
          }
          EOF
          echo "Compile -> resource.syso..."
          go install github.com/josephspurrier/goversioninfo/cmd/goversioninfo@latest
          ~/go/bin/goversioninfo -icon app.ico versioninfo.json

      - name: Build EXE (CGO cross-compile for go-sqlite3)
        run: |
          # 编译时间已在源码中更新（提交时固定），不重复替换
          CGO_ENABLED=1 GOOS=windows GOARCH=amd64 CC=x86_64-w64-mingw32-gcc \
          CGO_CFLAGS="-D_WIN32" CGO_LDFLAGS="-lws2_32" \
          go build -ldflags '-s -w -extldflags=-static' -o modbusrtu_broker.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: one-modbus-windows-amd64
          path: modbusrtu_broker.exe

  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: one-modbus-windows-amd64

      - name: Generate release notes
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          echo "# one-modbus $VERSION" > release_notes.md
          echo "" >> release_notes.md
          echo "- Windows amd64 单文件 exe，无需安装，解压即用" >> release_notes.md
          echo "- 配置方法：同级目录放 项目变量信息.xlsx（没有会自动生成模板）" >> release_notes.md
          echo "- 双击 modbusrtu_broker.exe 启动" >> release_notes.md
          echo "- 浏览器打开 http://127.0.0.1:53046/统计 即可进入" >> release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: one-modbus ${{ github.ref_name }}
          body_path: release_notes.md
          files: modbusrtu_broker.exe
          draft: false
          prerelease: false
