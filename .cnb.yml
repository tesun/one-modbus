# master.push 自动构建 + Release
master:
  push:
    - docker:
        image: golang:latest
      stages:
        - name: Cross-compile one-modbus.exe
          script: |
            set -e
            echo "=== Go version ==="
            go version
            echo "=== Set Go env ==="
            go env -w GOPROXY=https://goproxy.cn,direct
            go env GOPROXY
            echo "=== Install mingw-w64 ==="
            apt-get update -qq && apt-get install -y -qq gcc-mingw-w64-x86-64 2>/dev/null
            x86_64-w64-mingw32-gcc --version | head -1
            echo "=== Install goversioninfo ==="
            go install github.com/josephspurrier/goversioninfo/cmd/goversioninfo@latest
            echo "=== Generate .syso ==="
            ~/go/bin/goversioninfo -icon app.ico versioninfo.json
            echo "=== Cross-compile ==="
            export CGO_ENABLED=1 GOOS=windows GOARCH=amd64 CC=x86_64-w64-mingw32-gcc
            go mod download 2>&1
            go build -o one-modbus.exe -ldflags="-s -w" . 2>&1
            ls -lh one-modbus.exe
        - name: Publish Release
          script: |
            set -e
            [ ! -f one-modbus.exe ] && echo "No binary!" && ls -la && exit 1
            OWNER="pdlei.cn" REPO="one-modbus" API="https://api.cnb.cool"
            TAG=v$(python3 -c "import json;v=json.load(open('versioninfo.json'));print(f'{v[\"StringFileInfo\"][\"FileVersion\"].rstrip(\".0\")}')")
            echo "Release tag: $TAG"
            EXISTING=$(curl -s "$API/$OWNER/$REPO/-/releases/tags/$TAG" \
              -H "Accept: application/vnd.cnb.api+json" \
              -H "Authorization: Bearer $CNB_TOKEN" | python3 -c "import sys,json;print(json.load(sys.stdin).get('id',''))" 2>/dev/null)
            if [ -n "$EXISTING" ]; then
              echo "Release $TAG exists, id=$EXISTING"
              RID=$EXISTING
            else
              RESP=$(curl -s -X POST "$API/$OWNER/$REPO/-/releases" \
                -H "Authorization: Bearer $CNB_TOKEN" \
                -H "Content-Type: application/json" \
                -H "Accept: application/vnd.cnb.api+json" \
                -d "{\"tag_name\":\"$TAG\",\"name\":\"one-modbus $TAG\",\"target_commitish\":\"master\"}")
              RID=$(echo "$RESP" | python3 -c "import sys,json;print(json.load(sys.stdin).get('id',''))" 2>/dev/null)
              [ -z "$RID" ] && echo "Release failed: $RESP" && exit 1
            fi
            ASSETS=$(curl -s "$API/$OWNER/$REPO/-/releases/$RID" \
              -H "Accept: application/vnd.cnb.api+json" \
              -H "Authorization: Bearer $CNB_TOKEN" | python3 -c "import sys,json;print(len(json.load(sys.stdin).get('assets',[])))" 2>/dev/null)
            if [ "$ASSETS" -gt 0 ] 2>/dev/null; then
              echo "Assets exist ($ASSETS), skip upload"
            else
              UPLOAD=$(curl -s -X POST "$API/$OWNER/$REPO/-/releases/$RID/asset-upload-url" \
                -H "Authorization: Bearer $CNB_TOKEN" \
                -H "Content-Type: application/json" \
                -H "Accept: application/vnd.cnb.api+json" \
                -d "{\"asset_name\":\"modbusrtu_broker.exe\",\"size\":$(stat -c%s one-modbus.exe)}")
              UPURL=$(echo "$UPLOAD" | python3 -c "import sys,json;print(json.load(sys.stdin)['upload_url'])" 2>/dev/null)
              VERURL=$(echo "$UPLOAD" | python3 -c "import sys,json;print(json.load(sys.stdin)['verify_url'])" 2>/dev/null)
              [ -z "$UPURL" ] && echo "Upload failed: $UPLOAD" && exit 1
              curl -s -X PUT "$UPURL" -H "Content-Type: application/octet-stream" --data-binary "@one-modbus.exe"
              curl -s -X POST "$VERURL" -H "Authorization: Bearer $CNB_TOKEN" -H "Accept: application/vnd.cnb.api+json"
            fi
            echo "Release: https://cnb.cool/$OWNER/$REPO/-/releases/$TAG"
