# master.push 自动构建 + Release（基于已验证的 f8631ce 成功版）
# 改动点：tag 从 versioninfo.json 读 + release 已存在时跳过创建 + 附件已存在时跳过上传
master:
  push:
    - docker:
        image: golang:latest
      stages:
        - name: Cross-compile one-modbus.exe
          script: |
            set -e
            echo "=== Go version ==="
            go version
            echo "=== Install mingw-w64 ==="
            apt-get update -qq && apt-get install -y -qq gcc-mingw-w64-x86-64 2>/dev/null
            x86_64-w64-mingw32-gcc --version | head -1
            echo "=== Cross-compile ==="
            export CGO_ENABLED=1 GOOS=windows GOARCH=amd64 CC=x86_64-w64-mingw32-gcc
            export GOPROXY=https://goproxy.cn,direct
            go mod download 2>&1
            go build -o one-modbus.exe -ldflags="-s -w" . 2>&1
            ls -lh one-modbus.exe
        - name: Publish Release
          script: |
            set -e
            [ ! -f one-modbus.exe ] && echo "No binary!" && ls -la && exit 1
            OWNER="pdlei.cn" REPO="one-modbus" API="https://api.cnb.cool"
            # 从 versioninfo.json 读取版本号
            TAG=v$(grep -oP '"FileVersion":\s*"\K[^"]+' versioninfo.json | sed 's/\.0$//')
            echo "Release tag: $TAG"
            # 检查 release 是否已存在（固定 tag 时 key：先 git tag push 会占用 tag）
            EXISTING=$(curl -s "$API/$OWNER/$REPO/-/releases/$TAG" \
              -H "Accept: application/vnd.cnb.api+json" \
              -H "Authorization: Bearer $CNB_TOKEN" | grep -oP '"id":\K\d+' | head -1)
            if [ -n "$EXISTING" ]; then
              echo "Release $TAG already exists (id=$EXISTING), skip create"
              RID=$EXISTING
            else
              RESP=$(curl -s -X POST "$API/$OWNER/$REPO/-/releases" \
                -H "Authorization: Bearer $CNB_TOKEN" \
                -H "Content-Type: application/json" \
                -H "Accept: application/vnd.cnb.api+json" \
                -d "{\"tag_name\":\"$TAG\",\"name\":\"one-modbus $TAG\",\"target_commitish\":\"master\"}")
              RID=$(echo "$RESP" | grep -oP '"id":\K\d+' | head -1)
              [ -z "$RID" ] && echo "Release creation failed: $RESP" && exit 1
              echo "Created release id=$RID"
            fi
            # 检查附件是否已存在
            ASSETS=$(curl -s "$API/$OWNER/$REPO/-/releases/$RID" \
              -H "Accept: application/vnd.cnb.api+json" \
              -H "Authorization: Bearer $CNB_TOKEN" | grep -oP '"assets":\[.*?\]' | grep -o '"id"' | wc -l)
            if [ "$ASSETS" -gt 0 ]; then
              echo "Assets already exist ($ASSETS files), skip upload"
            else
              UPLOAD=$(curl -s -X POST "$API/$OWNER/$REPO/-/releases/$RID/asset-upload-url" \
                -H "Authorization: Bearer $CNB_TOKEN" \
                -H "Content-Type: application/json" \
                -H "Accept: application/vnd.cnb.api+json" \
                -d "{\"asset_name\":\"modbusrtu_broker_$TAG.exe\",\"size\":$(stat -c%s one-modbus.exe)}")
              UPURL=$(echo "$UPLOAD" | grep -oP '"upload_url":"\K[^"]+')
              VERURL=$(echo "$UPLOAD" | grep -oP '"verify_url":"\K[^"]+')
              [ -z "$UPURL" ] && echo "Upload failed: $UPLOAD" && exit 1
              curl -s -X PUT "$UPURL" -H "Content-Type: application/octet-stream" --data-binary "@one-modbus.exe"
              curl -s -X POST "$VERURL" -H "Authorization: Bearer $CNB_TOKEN" -H "Accept: application/vnd.cnb.api+json"
              echo "Upload OK"
            fi
            echo ""
            echo "Release: https://cnb.cool/$OWNER/$REPO/-/releases/$TAG"
