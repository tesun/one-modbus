# one-modbus auto build & release

master:
  push:
    - name: Build Check
      docker:
        image: golang:1.22-bookworm
      stages:
        - name: check
          script: echo "OK master:$CNB_BRANCH"

"v*":
  tag_push:
    - name: Build & Release
      docker:
        image: golang:1.22-bookworm
      stages:
        - name: install-deps
          script: |
            apt-get update -qq
            apt-get install -y -qq gcc-mingw-w64-x86-64 mingw-w64-tools jq curl
            go install github.com/josephspurrier/goversioninfo/cmd/goversioninfo@latest
        - name: gen-versioninfo
          script: |
            set -ex
            VER="${CNB_BRANCH#v}"
            printf '{"FixedFileInfo":{"FileVersion":{"Major":%s,"Minor":%s,"Patch":%s,"Build":0},"ProductVersion":{"Major":%s,"Minor":%s,"Patch":%s,"Build":0},"FileFlagsMask":"3f","FileFlags":"00","FileOS":"040004","FileType":"01","FileSubType":"00"},"StringFileInfo":{"Comments":"get: gitee.com/dingjiazhi/one-modbus/releases","CompanyName":"DJ","FileDescription":"modbusrtu_broker - Modbus RTU Gateway","FileVersion":"%s.0","InternalName":"modbusrtu_broker","LegalCopyright":"Copyright 2026 DJ","OriginalFilename":"modbusrtu_broker.exe","ProductName":"one-modbus","ProductVersion":"%s.0"},"IconPath":"app.ico","ManifestPath":""}' \
              $(echo $VER | cut -d. -f1) $(echo $VER | cut -d. -f2) $(echo $VER | cut -d. -f3) \
              $(echo $VER | cut -d. -f1) $(echo $VER | cut -d. -f2) $(echo $VER | cut -d. -f3) \
              $VER $VER > versioninfo.json
            cat versioninfo.json | head -5
            ~/go/bin/goversioninfo -icon app.ico versioninfo.json
            ls -la resource.syso
        - name: build-exe
          script: |
            set -ex
            export GOPROXY=https://goproxy.cn,direct
            go mod init modbusrtu_broker 2>/dev/null
            go mod tidy
            CGO_ENABLED=1 GOOS=windows GOARCH=amd64 CC=x86_64-w64-mingw32-gcc \
              CGO_CFLAGS="-D_WIN32" CGO_LDFLAGS="-lws2_32" \
              go build -ldflags '-s -w -extldflags=-static' -o modbusrtu_broker.exe
            ls -lh modbusrtu_broker.exe
        - name: create-release
          script: |
            set -ex
            VERSION="$CNB_BRANCH"
            REPO="$CNB_REPO_SLUG"
            EXE_NAME="modbusrtu_broker_${VERSION#v}.exe"
            cp modbusrtu_broker.exe /tmp/$EXE_NAME
            BODY=$(printf '{"tag_name":"%s","name":"one-modbus %s","body":"# one-modbus %s\n\nDownload: https://gitee.com/dingjiazhi/one-modbus/releases/tag/%s","target_commitish":"master"}' "$VERSION" "$VERSION" "$VERSION" "$VERSION")
            RESP=$(curl -s -X POST "$CNB_API_ENDPOINT/$REPO/-/releases" \
              -H "Authorization: Bearer $CNB_TOKEN" \
              -H "Content-Type: application/json" \
              -H "Accept: application/vnd.cnb.api+json" \
              -d "$BODY")
            RELEASE_ID=$(echo "$RESP" | jq -r '.id // empty')
            echo "Release ID: $RELEASE_ID"
            [ -n "$RELEASE_ID" ] || { echo "FAILED: $RESP"; exit 1; }
            EXE_SIZE=$(stat -c%s /tmp/$EXE_NAME)
            UPLOAD_RESP=$(curl -s -X POST "$CNB_API_ENDPOINT/$REPO/-/releases/$RELEASE_ID/asset-upload-url" \
              -H "Authorization: Bearer $CNB_TOKEN" \
              -H "Content-Type: application/json" \
              -H "Accept: application/vnd.cnb.api+json" \
              -d "{\"asset_name\":\"$EXE_NAME\",\"size\":$EXE_SIZE,\"overwrite\":true}")
            UPLOAD_URL=$(echo "$UPLOAD_RESP" | jq -r '.url // empty')
            [ -n "$UPLOAD_URL" ] && curl -s -X PUT "$UPLOAD_URL" -H "Content-Type: application/octet-stream" --data-binary @/tmp/$EXE_NAME
            echo "OK: https://cnb.cool/$REPO/releases/tag/$VERSION"
