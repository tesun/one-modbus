# one-modbus 自动构建配置

master:
  push:
    - name: Build Check
      docker:
        image: golang:1.22-bookworm
      stages:
        - name: quick-check
          script: |
            echo "Pipeline OK master:$CNB_BRANCH"

"v*":
  tag_push:
    - name: Build & Release
      docker:
        image: golang:1.22-bookworm
      stages:
        - name: install-deps
          script: |
            apt-get update -qq
            apt-get install -y -qq gcc-mingw-w64-x86-64 mingw-w64-tools jq curl python3
            go install github.com/josephspurrier/goversioninfo/cmd/goversioninfo@latest
        - name: gen-versioninfo
          script: |
            set -ex
            VER=v999
            MAJ=0; MIN=0; PAT=0
            IFS='.' read -ra P <<< "$VER"
            python3 -c 'import json; json.dump({"FixedFileInfo":{"FileVersion":{"Major":0,"Minor":0,"Patch":0,"Build":0},"ProductVersion":{"Major":0,"Minor":0,"Patch":0,"Build":0},"FileFlagsMask":"3f","FileFlags":"00","FileOS":"040004","FileType":"01","FileSubType":"00"},"StringFileInfo":{"Comments":"test","CompanyName":"DJ","FileDescription":"modbusrtu_broker","FileVersion":"0.0.0.0","InternalName":"modbusrtu_broker","LegalCopyright":"Copyright DJ","OriginalFilename":"modbusrtu_broker.exe","ProductName":"one-modbus","ProductVersion":"0.0.0.0"},"IconPath":"app.ico","ManifestPath":""}, open("versioninfo.json","w"), indent=2)'
            echo "versioninfo.json generated"
        - name: build-exe
          script: |
            echo "BUILD-EXE START"
            ls -la
            echo "BUILD-EXE END"
