<svg viewBox="0 0 680 480" width="100%" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="One-modbus software architecture diagram">
  <title>one-modbus system architecture</title>
  <desc>Four-layer architecture: notification layer, service layer, core engine, and field devices</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Notification Layer -->
  <rect x="60" y="30" width="560" height="90" rx="16" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <rect x="80" y="46" width="100" height="28" rx="8" fill="#CECBF6" stroke="none"/>
  <text x="130" y="60" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="13" font-weight="500" fill="#3C3489">通知层</text>
  <text x="130" y="102" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#534AB7" font-weight="500">Outbound</text>
  <text x="260" y="80" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="13" fill="#3C3489">企业微信机器人</text>
  <text x="400" y="80" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="13" fill="#3C3489">微信报警推送</text>
  <text x="530" y="80" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="13" fill="#3C3489">邮件 · 定时报表</text>

  <line x1="340" y1="120" x2="340" y2="150" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Service Layer -->
  <rect x="60" y="155" width="560" height="90" rx="16" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
  <rect x="80" y="171" width="100" height="28" rx="8" fill="#B5D4F4" stroke="none"/>
  <text x="130" y="185" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="13" font-weight="500" fill="#185FA5">服务层</text>
  <text x="130" y="227" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#378ADD" font-weight="500">HTTP</text>
  <text x="260" y="205" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="13" fill="#185FA5">REST API · 文件服务器</text>
  <text x="450" y="205" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="13" fill="#185FA5">曲线图 · 远程升级</text>

  <line x1="340" y1="245" x2="340" y2="275" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Core Engine Layer -->
  <rect x="60" y="280" width="560" height="90" rx="16" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
  <rect x="80" y="296" width="100" height="28" rx="8" fill="#9FE1CB" stroke="none"/>
  <text x="130" y="310" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="13" font-weight="500" fill="#0F6E56">核心引擎</text>
  <text x="130" y="352" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#1D9E75" font-weight="500">Engine</text>
  <text x="260" y="330" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="13" fill="#0F6E56">Modbus 采集 · 批量读优化</text>
  <text x="480" y="330" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="13" fill="#0F6E56">SQLite 存储 · Excel 配置</text>

  <line x1="340" y1="370" x2="340" y2="400" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Field Devices Layer -->
  <rect x="140" y="405" width="400" height="55" rx="16" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <rect x="160" y="415" width="80" height="28" rx="8" fill="#D3D1C7" stroke="none"/>
  <text x="200" y="429" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="13" font-weight="500" fill="#5F5E5A">现场设备</text>
  <text x="310" y="436" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#5F5E5A">PLC · 电表 · 传感器 · 变频器 · 温控器</text>
</svg>